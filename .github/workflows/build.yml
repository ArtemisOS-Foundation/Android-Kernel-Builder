name: 🚀 Kernel Builder

on:
  workflow_dispatch:
    inputs:
      kernel_source:
        description: '🔗 Kernel Source URL'
        required: true
        type: string
      kernel_branch:
        description: '🌿 Kernel Source Branch'
        required: true
        type: string
      defconfig:
        description: '⚙️ Kernel Defconfig'
        required: true
        type: string
      ksu_next:
        description: '🛡️ KernelSU Next Patch'
        required: true
        type: choice
        options:
          - 'yes'
          - 'no'
        default: 'no'
      kbuild_user:
        description: '👤 KBuild User'
        required: true
        type: string
      device_codename:
        description: '📱 Device Codename'
        required: true
        type: string
      kernel_name:
        description: '🏷️ Kernel Name'
        required: true
        type: string
      use_anykernel:
        description: '📦 Use AnyKernel3'
        required: true
        type: choice
        options:
          - 'yes'
          - 'no'
        default: 'yes'
      anykernel_source:
        description: '📦 AnyKernel Source URL (if Use AnyKernel = yes)'
        required: false
        type: string
      anykernel_branch:
        description: '🌿 AnyKernel Branch (if Use AnyKernel = yes)'
        required: false
        type: string
      timezone:
        description: '🌍 Timezone'
        required: false
        type: string
        default: 'Asia/Jakarta'

env:
  TZ: ${{ github.event.inputs.timezone }}

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: 📅 Setup Date & Time
        id: date
        run: |
          echo "DATE=$(date +'%d%m%Y')" >> $GITHUB_ENV
          echo "FULL_DATE=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV
          echo "📅 Build Date: $(date +'%Y-%m-%d %H:%M:%S')"

      - name: 🎉 Welcome Message
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║         🚀 Android Kernel Builder - GitHub Actions         ║"
          echo "╠════════════════════════════════════════════════════════════╣"
          echo "║  🔗 Kernel Source: ${{ github.event.inputs.kernel_source }}"
          echo "║  🌿 Branch: ${{ github.event.inputs.kernel_branch }}"
          echo "║  ⚙️  Defconfig: ${{ github.event.inputs.defconfig }}"
          echo "║  🛡️  KernelSU Next: ${{ github.event.inputs.ksu_next }}"
          echo "║  👤 KBuild User: ${{ github.event.inputs.kbuild_user }}"
          echo "║  📱 Device: ${{ github.event.inputs.device_codename }}"
          echo "║  🏷️  Kernel Name: ${{ github.event.inputs.kernel_name }}"
          echo "║  📦 AnyKernel: ${{ github.event.inputs.use_anykernel }}"
          echo "║  🌍 Timezone: ${{ github.event.inputs.timezone }}"
          echo "╚════════════════════════════════════════════════════════════╝"

      - name: 🧰 Install Dependencies
        run: |
          echo "🔧 Installing build dependencies..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq             bc bison build-essential ccache curl flex             git gnupg gperf imagemagick lib32ncurses5-dev             lib32readline-dev lib32z1-dev libc6-dev-i386             libelf-dev liblz4-tool libncurses5-dev libsdl1.2-dev             libssl-dev libxml2 libxml2-utils lzop pngcrush             rsync schedtool squashfs-tools xsltproc zip zlib1g-dev             libncurses5 libncursesw5 libtinfo5 python3 python3-pip             device-tree-compiler libbrotli-dev libzstd-dev             libarchive-tools zstd 2>&1 | tail -n 5
          echo "✅ Dependencies installed successfully!"

      - name: 🔧 Setup Python & Packages
        run: |
          echo "🐍 Setting up Python environment..."
          pip3 install -q pyelftools 2>/dev/null || true
          sudo ln -sf /usr/bin/python3 /usr/bin/python 2>/dev/null || true
          echo "✅ Python setup complete!"

      - name: 📥 Clone Kernel Source
        run: |
          echo "📥 Cloning kernel source..."
          git clone --depth=1 -b ${{ github.event.inputs.kernel_branch }}             ${{ github.event.inputs.kernel_source }} kernel
          cd kernel
          echo "✅ Kernel source cloned!"
          echo "📂 Current directory: $(pwd)"
          echo "📋 Latest commit: $(git log --oneline -1)"

      - name: 🔍 Detect Kernel Version
        id: kver
        run: |
          cd kernel
          # Try to detect kernel version from Makefile
          if [ -f Makefile ]; then
            KVER_MAJOR=$(grep -m1 "^VERSION = " Makefile | awk '{print $3}')
            KVER_MINOR=$(grep -m1 "^PATCHLEVEL = " Makefile | awk '{print $3}')
            KVER_PATCH=$(grep -m1 "^SUBLEVEL = " Makefile | awk '{print $3}')
            echo "KERNEL_VERSION=${KVER_MAJOR}.${KVER_MINOR}.${KVER_PATCH}" >> $GITHUB_ENV
            echo "🎯 Detected Kernel Version: ${KVER_MAJOR}.${KVER_MINOR}.${KVER_PATCH}"
          else
            echo "KERNEL_VERSION=unknown" >> $GITHUB_ENV
            echo "⚠️ Could not detect kernel version"
          fi

      - name: 🛡️ Patch KernelSU Next
        if: github.event.inputs.ksu_next == 'yes'
        run: |
          echo "🛡️ Patching KernelSU Next..."
          cd kernel

          # Clone KernelSU Next
          git clone --depth=1 https://github.com/rifsxd/KernelSU-Next.git KernelSU-Next 2>/dev/null ||           git clone --depth=1 https://github.com/tiann/KernelSU.git KernelSU-Next 2>/dev/null ||           git clone --depth=1 https://github.com/KernelSU-Next/KernelSU-Next.git KernelSU-Next 2>/dev/null || true

          if [ -d "KernelSU-Next" ]; then
            cd KernelSU-Next
            KSU_GIT_VER=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
            cd ..

            # Apply KernelSU patch
            if [ -f "KernelSU-Next/kernel/setup.sh" ]; then
              bash KernelSU-Next/kernel/setup.sh
            elif [ -f "KernelSU-Next/setup.sh" ]; then
              bash KernelSU-Next/setup.sh
            else
              # Manual symlink approach
              ln -sf $(pwd)/KernelSU-Next/kernel $(pwd)/drivers/kernelsu 2>/dev/null || true
              # Add to Kconfig if needed
              if [ -f "drivers/Kconfig" ]; then
                if ! grep -q "kernelsu" drivers/Kconfig; then
                  echo "source drivers/kernelsu/Kconfig" >> drivers/Kconfig
                fi
              fi
            fi

            # Enable KernelSU in defconfig
            echo "CONFIG_KSU=y" >> arch/arm64/configs/${{ github.event.inputs.defconfig }} 2>/dev/null ||             echo "CONFIG_KSU=y" >> arch/arm/configs/${{ github.event.inputs.defconfig }} 2>/dev/null || true

            echo "✅ KernelSU Next patched! (Git: ${KSU_GIT_VER})"
          else
            echo "⚠️ Failed to clone KernelSU Next, continuing without patch..."
          fi

      - name: 📥 Clone Clang Toolchain
        run: |
          echo "📥 Cloning AOSP Clang toolchain..."
          mkdir -p toolchain
          cd toolchain

          # Clone with depth=1 for faster checkout
          git clone --depth=1 -b master             https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 clang 2>&1 | tail -n 3

          # Find latest clang version
          CLANG_DIR=$(ls -d clang/clang-r* 2>/dev/null | sort -V | tail -n 1)
          if [ -z "$CLANG_DIR" ]; then
            # Fallback: try to find any clang directory
            CLANG_DIR=$(find clang -maxdepth 2 -name "bin" -type d | head -n 1 | xargs dirname)
          fi

          if [ -n "$CLANG_DIR" ] && [ -d "$CLANG_DIR/bin" ]; then
            echo "CLANG_PATH=$(realpath $CLANG_DIR)" >> $GITHUB_ENV
            echo "✅ Clang found at: $(realpath $CLANG_DIR)"
            echo "🔧 Clang version: $($CLANG_DIR/bin/clang --version | head -n 1)"
          else
            echo "❌ Clang toolchain not found properly!"
            ls -la clang/
            exit 1
          fi

      - name: 📥 Clone GCC Toolchain (Fallback)
        run: |
          echo "📥 Setting up GCC toolchain..."
          cd toolchain

          # Clone aarch64-linux-android-4.9
          git clone --depth=1 -b master             https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9             gcc-aarch64 2>&1 | tail -n 3 || true

          # Clone arm-linux-androideabi-4.9 for 32-bit support
          git clone --depth=1 -b master             https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9             gcc-arm 2>&1 | tail -n 3 || true

          echo "✅ GCC toolchain setup complete!"

      - name: 🔧 Setup Build Environment
        run: |
          echo "🔧 Setting up build environment..."
          cd kernel

          # Export build variables
          export KBUILD_BUILD_USER="${{ github.event.inputs.kbuild_user }}"
          export KBUILD_BUILD_HOST="GitHub-Actions"
          export KBUILD_BUILD_TIMESTAMP="${{ env.FULL_DATE }}"

          # Set PATH
          export PATH="${{ env.CLANG_PATH }}/bin:$PATH"

          # Detect if we need arm64 or arm
          if [ -d "arch/arm64" ]; then
            export ARCH=arm64
            export SUBARCH=arm64
            export CROSS_COMPILE="${{ github.workspace }}/toolchain/gcc-aarch64/bin/aarch64-linux-android-"
            export CROSS_COMPILE_ARM32="${{ github.workspace }}/toolchain/gcc-arm/bin/arm-linux-androideabi-"
            export CLANG_TRIPLE="aarch64-linux-gnu-"
            echo "🎯 Architecture: arm64"
          else
            export ARCH=arm
            export SUBARCH=arm
            export CROSS_COMPILE="${{ github.workspace }}/toolchain/gcc-arm/bin/arm-linux-androideabi-"
            export CLANG_TRIPLE="arm-linux-gnueabihf-"
            echo "🎯 Architecture: arm"
          fi

          # Save to GITHUB_ENV for next steps
          echo "ARCH=${ARCH}" >> $GITHUB_ENV
          echo "SUBARCH=${SUBARCH}" >> $GITHUB_ENV
          echo "CROSS_COMPILE=${CROSS_COMPILE}" >> $GITHUB_ENV
          echo "CROSS_COMPILE_ARM32=${CROSS_COMPILE_ARM32}" >> $GITHUB_ENV
          echo "CLANG_TRIPLE=${CLANG_TRIPLE}" >> $GITHUB_ENV
          echo "KBUILD_BUILD_USER=${KBUILD_BUILD_USER}" >> $GITHUB_ENV
          echo "KBUILD_BUILD_HOST=${KBUILD_BUILD_HOST}" >> $GITHUB_ENV

          echo "✅ Build environment configured!"

      - name: 🧹 Clean Build (Optional)
        run: |
          echo "🧹 Cleaning previous build artifacts..."
          cd kernel
          make clean 2>/dev/null || true
          make mrproper 2>/dev/null || true
          echo "✅ Clean complete!"

      - name: ⚙️ Generate Defconfig
        run: |
          echo "⚙️ Generating defconfig..."
          cd kernel

          export PATH="${{ env.CLANG_PATH }}/bin:$PATH"
          export ARCH=${{ env.ARCH }}
          export SUBARCH=${{ env.SUBARCH }}
          export CROSS_COMPILE=${{ env.CROSS_COMPILE }}
          export CROSS_COMPILE_ARM32=${{ env.CROSS_COMPILE_ARM32 }}
          export CLANG_TRIPLE=${{ env.CLANG_TRIPLE }}
          export KBUILD_BUILD_USER=${{ env.KBUILD_BUILD_USER }}
          export KBUILD_BUILD_HOST=${{ env.KBUILD_BUILD_HOST }}

          make ${{ github.event.inputs.defconfig }} O=out 2>&1 | tail -n 10
          echo "✅ Defconfig generated!"

      - name: 🔨 Build Kernel
        run: |
          echo "🔨 Starting kernel build..."
          echo "⏳ This may take a while, please be patient..."
          cd kernel

          export PATH="${{ env.CLANG_PATH }}/bin:$PATH"
          export ARCH=${{ env.ARCH }}
          export SUBARCH=${{ env.SUBARCH }}
          export CROSS_COMPILE=${{ env.CROSS_COMPILE }}
          export CROSS_COMPILE_ARM32=${{ env.CROSS_COMPILE_ARM32 }}
          export CLANG_TRIPLE=${{ env.CLANG_TRIPLE }}
          export KBUILD_BUILD_USER=${{ env.KBUILD_BUILD_USER }}
          export KBUILD_BUILD_HOST=${{ env.KBUILD_BUILD_HOST }}

          # Build with Clang + LLVM tools
          make -j$(nproc --all) O=out             CC=clang             AR=llvm-ar             NM=llvm-nm             OBJCOPY=llvm-objcopy             OBJDUMP=llvm-objdump             STRIP=llvm-strip             CROSS_COMPILE=${{ env.CROSS_COMPILE }}             CROSS_COMPILE_ARM32=${{ env.CROSS_COMPILE_ARM32 }}             CLANG_TRIPLE=${{ env.CLANG_TRIPLE }}             2>&1 | tee build.log | tail -n 30

          BUILD_STATUS=${PIPESTATUS[0]}

          if [ $BUILD_STATUS -ne 0 ]; then
            echo "❌ Build failed! Checking for common errors..."

            # Check for common errors
            if grep -q "vdso" build.log; then
              echo "⚠️ VDSO error detected! Applying fix..."
              # Fix VDSO compilation issues
              if [ -f "arch/arm64/kernel/vdso/Makefile" ]; then
                sed -i 's/-Wl,-Bdynamic//g' arch/arm64/kernel/vdso/Makefile 2>/dev/null || true
                sed -i 's/-Wl,-Bstatic//g' arch/arm64/kernel/vdso/Makefile 2>/dev/null || true
              fi
              if [ -f "arch/arm/kernel/vdso/Makefile" ]; then
                sed -i 's/-Wl,-Bdynamic//g' arch/arm/kernel/vdso/Makefile 2>/dev/null || true
                sed -i 's/-Wl,-Bstatic//g' arch/arm/kernel/vdso/Makefile 2>/dev/null || true
              fi

              # Retry build
              make -j$(nproc --all) O=out                 CC=clang                 AR=llvm-ar                 NM=llvm-nm                 OBJCOPY=llvm-objcopy                 OBJDUMP=llvm-objdump                 STRIP=llvm-strip                 CROSS_COMPILE=${{ env.CROSS_COMPILE }}                 CROSS_COMPILE_ARM32=${{ env.CROSS_COMPILE_ARM32 }}                 CLANG_TRIPLE=${{ env.CLANG_TRIPLE }}                 2>&1 | tee build.log | tail -n 30
              BUILD_STATUS=${PIPESTATUS[0]}
            fi

            if grep -q "stack-protector" build.log || grep -q "stack protector" build.log; then
              echo "⚠️ Stack protector error detected! Applying fix..."
              # Disable stack protector
              sed -i 's/CONFIG_CC_STACKPROTECTOR=y/# CONFIG_CC_STACKPROTECTOR is not set/g' out/.config 2>/dev/null || true
              sed -i 's/CONFIG_CC_STACKPROTECTOR_STRONG=y/# CONFIG_CC_STACKPROTECTOR_STRONG is not set/g' out/.config 2>/dev/null || true
              sed -i 's/CONFIG_CC_STACKPROTECTOR_AUTO=y/# CONFIG_CC_STACKPROTECTOR_AUTO is not set/g' out/.config 2>/dev/null || true
              echo "# CONFIG_CC_STACKPROTECTOR is not set" >> out/.config 2>/dev/null || true
              echo "# CONFIG_CC_STACKPROTECTOR_STRONG is not set" >> out/.config 2>/dev/null || true
              echo "# CONFIG_CC_STACKPROTECTOR_AUTO is not set" >> out/.config 2>/dev/null || true

              # Retry build
              make -j$(nproc --all) O=out                 CC=clang                 AR=llvm-ar                 NM=llvm-nm                 OBJCOPY=llvm-objcopy                 OBJDUMP=llvm-objdump                 STRIP=llvm-strip                 CROSS_COMPILE=${{ env.CROSS_COMPILE }}                 CROSS_COMPILE_ARM32=${{ env.CROSS_COMPILE_ARM32 }}                 CLANG_TRIPLE=${{ env.CLANG_TRIPLE }}                 2>&1 | tee build.log | tail -n 30
              BUILD_STATUS=${PIPESTATUS[0]}
            fi

            if grep -q "linker.*not found" build.log || grep -q "ld.*not found" build.log || grep -q "cannot find -ld" build.log; then
              echo "⚠️ Linker error detected! Applying fix..."
              # Fix linker issues
              export LD_LIBRARY_PATH="${{ env.CLANG_PATH }}/lib:$LD_LIBRARY_PATH"
              export LDFLAGS="-L${{ env.CLANG_PATH }}/lib"

              # Retry build
              make -j$(nproc --all) O=out                 CC=clang                 AR=llvm-ar                 NM=llvm-nm                 OBJCOPY=llvm-objcopy                 OBJDUMP=llvm-objdump                 STRIP=llvm-strip                 LD=ld.lld                 CROSS_COMPILE=${{ env.CROSS_COMPILE }}                 CROSS_COMPILE_ARM32=${{ env.CROSS_COMPILE_ARM32 }}                 CLANG_TRIPLE=${{ env.CLANG_TRIPLE }}                 2>&1 | tee build.log | tail -n 30
              BUILD_STATUS=${PIPESTATUS[0]}
            fi

            if [ $BUILD_STATUS -ne 0 ]; then
              echo "❌ Build still failed after fixes!"
              echo "📋 Last 50 lines of build log:"
              tail -n 50 build.log
              exit 1
            fi
          fi

          echo "✅ Kernel build completed successfully!"

      - name: 🔍 Find Kernel Image
        id: kernel_image
        run: |
          echo "🔍 Searching for compiled kernel image..."
          cd kernel

          # Common kernel image locations
          KERNEL_IMG=""
          for img in "out/arch/${{ env.ARCH }}/boot/Image.gz-dtb"                      "out/arch/${{ env.ARCH }}/boot/Image.gz"                      "out/arch/${{ env.ARCH }}/boot/Image"                      "arch/${{ env.ARCH }}/boot/Image.gz-dtb"                      "arch/${{ env.ARCH }}/boot/Image.gz"                      "arch/${{ env.ARCH }}/boot/Image"                      "out/arch/arm64/boot/Image.gz-dtb"                      "out/arch/arm64/boot/Image.gz"                      "out/arch/arm64/boot/Image"                      "out/arch/arm/boot/zImage"                      "out/arch/arm/boot/zImage-dtb"                      "arch/arm/boot/zImage"                      "arch/arm/boot/zImage-dtb"; do
            if [ -f "$img" ]; then
              KERNEL_IMG="$img"
              echo "✅ Kernel image found: $img"
              break
            fi
          done

          if [ -z "$KERNEL_IMG" ]; then
            echo "❌ Kernel image not found!"
            echo "📂 Available files in boot directory:"
            find out/arch -name "Image*" -o -name "zImage*" 2>/dev/null || true
            find arch -name "Image*" -o -name "zImage*" 2>/dev/null || true
            exit 1
          fi

          echo "KERNEL_IMAGE=${KERNEL_IMG}" >> $GITHUB_ENV
          echo "KERNEL_SIZE=$(du -h ${KERNEL_IMG} | cut -f1)" >> $GITHUB_ENV
          echo "📊 Kernel size: $(du -h ${KERNEL_IMG} | cut -f1)"

      - name: 📦 Prepare Output Filename
        id: filename
        run: |
          echo "📦 Preparing output filename..."

          # Determine variant based on KernelSU
          if [ "${{ github.event.inputs.ksu_next }}" == "yes" ]; then
            VARIANT="ksu"
          else
            VARIANT=""
          fi

          # Build filename
          if [ -n "$VARIANT" ]; then
            OUTPUT_NAME="${{ github.event.inputs.kernel_name }}_${{ github.event.inputs.device_codename }}-${VARIANT}-${{ env.DATE }}.zip"
          else
            OUTPUT_NAME="${{ github.event.inputs.kernel_name }}_${{ github.event.inputs.device_codename }}-${{ env.DATE }}.zip"
          fi

          echo "OUTPUT_NAME=${OUTPUT_NAME}" >> $GITHUB_ENV
          echo "📝 Output filename: ${OUTPUT_NAME}"

      - name: 📦 Package with AnyKernel3
        if: github.event.inputs.use_anykernel == 'yes'
        run: |
          echo "📦 Packaging with AnyKernel3..."

          # Clone AnyKernel3
          git clone --depth=1 -b ${{ github.event.inputs.anykernel_branch }}             ${{ github.event.inputs.anykernel_source }} anykernel 2>&1 | tail -n 3

          cd anykernel

          # Clean up old zImage
          rm -f zImage Image* *.dtb 2>/dev/null || true

          # Copy new kernel image
          cp ../kernel/${{ env.KERNEL_IMAGE }} . 2>/dev/null ||           cp ${{ env.KERNEL_IMAGE }} . 2>/dev/null || true

          # Handle dtb if present
          if [ -f "../kernel/out/arch/${{ env.ARCH }}/boot/dtb" ]; then
            cp ../kernel/out/arch/${{ env.ARCH }}/boot/dtb . 2>/dev/null || true
          fi

          # Handle dtbo if present
          if [ -f "../kernel/out/arch/${{ env.ARCH }}/boot/dtbo.img" ]; then
            cp ../kernel/out/arch/${{ env.ARCH }}/boot/dtbo.img . 2>/dev/null || true
          fi

          # Update anykernel.sh if exists
          if [ -f "anykernel.sh" ]; then
            sed -i "s/kernel.string=.*/kernel.string=${{ github.event.inputs.kernel_name }}/g" anykernel.sh 2>/dev/null || true
            sed -i "s/device.name1=.*/device.name1=${{ github.event.inputs.device_codename }}/g" anykernel.sh 2>/dev/null || true
          fi

          # Create zip
          zip -r9 ../${{ env.OUTPUT_NAME }} * -x ".git/*" "*.md" "LICENSE" 2>&1 | tail -n 5
          cd ..

          echo "✅ AnyKernel3 package created!"
          echo "📊 Package size: $(du -h ${{ env.OUTPUT_NAME }} | cut -f1)"

      - name: 📦 Package Raw Kernel
        if: github.event.inputs.use_anykernel == 'no'
        run: |
          echo "📦 Packaging raw kernel..."

          mkdir -p raw_kernel
          cp kernel/${{ env.KERNEL_IMAGE }} raw_kernel/ 2>/dev/null ||           cp ${{ env.KERNEL_IMAGE }} raw_kernel/ 2>/dev/null || true

          # Include dtb if available
          if [ -f "kernel/out/arch/${{ env.ARCH }}/boot/dtb" ]; then
            cp kernel/out/arch/${{ env.ARCH }}/boot/dtb raw_kernel/ 2>/dev/null || true
          fi

          # Include dtbo if available
          if [ -f "kernel/out/arch/${{ env.ARCH }}/boot/dtbo.img" ]; then
            cp kernel/out/arch/${{ env.ARCH }}/boot/dtbo.img raw_kernel/ 2>/dev/null || true
          fi

          # Create info file
          cat > raw_kernel/README.txt << EOF
          Kernel: ${{ github.event.inputs.kernel_name }}
          Device: ${{ github.event.inputs.device_codename }}
          Date: ${{ env.FULL_DATE }}
          KernelSU Next: ${{ github.event.inputs.ksu_next }}
          Build User: ${{ github.event.inputs.kbuild_user }}
          EOF

          cd raw_kernel
          zip -r9 ../${{ env.OUTPUT_NAME }} * 2>&1 | tail -n 5
          cd ..

          echo "✅ Raw kernel package created!"
          echo "📊 Package size: $(du -h ${{ env.OUTPUT_NAME }} | cut -f1)"

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OUTPUT_NAME }}
          path: ${{ env.OUTPUT_NAME }}
          retention-days: 7

      - name: 🎉 Build Summary
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║                   🎉 BUILD SUCCESSFUL! 🎉                  ║"
          echo "╠════════════════════════════════════════════════════════════╣"
          echo "║  🏷️  Kernel Name: ${{ github.event.inputs.kernel_name }}"
          echo "║  📱 Device: ${{ github.event.inputs.device_codename }}"
          echo "║  🛡️  KernelSU Next: ${{ github.event.inputs.ksu_next }}"
          echo "║  📦 Package: ${{ env.OUTPUT_NAME }}"
          echo "║  📊 Kernel Size: ${{ env.KERNEL_SIZE }}"
          echo "║  📅 Build Date: ${{ env.FULL_DATE }}"
          echo "║  👤 Built by: ${{ github.event.inputs.kbuild_user }}"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          echo "📥 Download your kernel from the Artifacts section!"
