name: Android Kernel Build

on:
  workflow_dispatch:
    inputs:
      KERNEL_SOURCE_URL:
        description: 'Kernel Source URL'
        required: true
      KERNEL_SOURCE_BRANCH:
        description: 'Kernel Source Branch'
        required: true
      KERNEL_DEFCONFIG:
        description: 'Kernel Defconfig'
        required: true
      KSU_PATCH:
        description: 'KernelSU Next Patch (yes/no)'
        required: true
      KBUILD_USER:
        description: 'KBuild User'
        required: true
      DEVICE_CODENAME:
        description: 'Device Codename'
        required: true
      KERNEL_NAME:
        description: 'Kernel Name'
        required: true
      USE_ANYKERNEL:
        description: 'Use AnyKernel (yes/no)'
        required: true
      ANYKERNEL_SOURCE:
        description: 'Anykernel Source'
        required: false
      ANYKERNEL_BRANCH:
        description: 'Anykernel Branch'
        required: false
      TIMEZONE:
        description: 'Timezone'
        default: 'Asia/Jakarta'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout Repo
        uses: actions/checkout@v4

      - name: ⚙️ Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget build-essential bc bison flex libssl-dev \
            libncurses5-dev libncursesw5-dev python3 python3-pip zip curl
          sudo timedatectl set-timezone "${{ github.event.inputs.TIMEZONE }}"

      - name: 📥 Clone Kernel Source
        run: |
          git clone ${{ github.event.inputs.KERNEL_SOURCE_URL }} -b ${{ github.event.inputs.KERNEL_SOURCE_BRANCH }} kernel

      - name: 🛠️ Clone Clang 13
        run: |
          git clone https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 -b master clang-prebuilt
          export PATH=$PWD/clang-prebuilt/clang-r416183b/bin:$PATH

      - name: 🔧 Setup GCC 4.9
        run: |
          git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 gcc32
          git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 gcc64

      - name: 🧩 Apply KernelSU Next Patch (Optional)
        if: ${{ github.event.inputs.KSU_PATCH == 'yes' }}
        run: |
          cd kernel
          echo "Applying KernelSU Next patch..."
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s stable

      - name: 🏗️ Build Kernel
        run: |
          cd kernel
          export ARCH=arm64
          export SUBARCH=arm64
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=$PWD/../gcc64/bin/aarch64-linux-android-
          export CROSS_COMPILE_ARM32=$PWD/../gcc32/bin/arm-linux-androideabi-
          export KBUILD_BUILD_USER=${{ github.event.inputs.KBUILD_USER }}
          export KBUILD_BUILD_HOST=GitHubActions

          make O=out ${{ github.event.inputs.KERNEL_DEFCONFIG }}
          make -j$(nproc) O=out

      - name: 📦 Package Kernel
        run: |
          cd kernel/out/arch/arm64/boot
          VARIANT=""
          if [ "${{ github.event.inputs.KSU_PATCH }}" == "yes" ]; then
            VARIANT="-ksu"
          fi
          DATE=$(date +%d%m%Y)
          ZIPNAME="${{ github.event.inputs.KERNEL_NAME }}_${{ github.event.inputs.DEVICE_CODENAME }}${VARIANT}-${DATE}.zip"

          if [ "${{ github.event.inputs.USE_ANYKERNEL }}" == "yes" ]; then
            git clone ${{ github.event.inputs.ANYKERNEL_SOURCE }} -b ${{ github.event.inputs.ANYKERNEL_BRANCH }} anykernel
            cp Image.gz-dtb anykernel/
            cd anykernel
            zip -r9 "../$ZIPNAME" *
          else
            zip -r9 "$ZIPNAME" Image.gz-dtb
          fi

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: Kernel-Build
          path: kernel/out/arch/arm64/boot/*.zip
