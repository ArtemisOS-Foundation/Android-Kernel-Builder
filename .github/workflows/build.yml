
Action: file_editor create /app/.github/workflows/kernel-build.yml --file-text "name: Android Kernel Build

on:
  workflow_dispatch:
    inputs:
      KERNEL_SOURCE_URL:
        description: \"Kernel Source URL (contoh: https://github.com/username/kernel_repo)\"
        required: true
        default: \"https://github.com/username/kernel_repo\"
      KERNEL_SOURCE_BRANCH:
        description: \"Kernel Source Branch\"
        required: true
        default: \"main\"
      KERNEL_DEFCONFIG:
        description: \"Kernel Defconfig (contoh: vendor/lavender-perf_defconfig)\"
        required: true
        default: \"defconfig\"
      KERNELSU_NEXT:
        description: \"KernelSU Next Patch (yes / no)\"
        required: true
        default: \"no\"
        type: choice
        options:
          - \"yes\"
          - \"no\"
      KBUILD_USER:
        description: \"KBuild User\"
        required: true
        default: \"builder\"
      DEVICE_CODENAME:
        description: \"Device Codename (contoh: lavender)\"
        required: true
        default: \"lavender\"
      KERNEL_NAME:
        description: \"Kernel Name (contoh: MyKernel)\"
        required: true
        default: \"MyKernel\"
      USE_ANYKERNEL:
        description: \"Use AnyKernel3 (yes / no)\"
        required: true
        default: \"yes\"
        type: choice
        options:
          - \"yes\"
          - \"no\"
      ANYKERNEL_SOURCE:
        description: \"AnyKernel Source URL\"
        required: false
        default: \"https://github.com/osm0sis/AnyKernel3\"
      ANYKERNEL_BRANCH:
        description: \"AnyKernel Branch\"
        required: false
        default: \"master\"
      TOOLCHAIN:
        description: \"Toolchain / Compiler\"
        required: true
        default: \"auto\"
        type: choice
        options:
          - \"auto\"
          - \"aosp-clang\"
          - \"neutron-clang\"
          - \"proton-clang\"
      TIMEZONE:
        description: \"Timezone (bebas, default Asia/Jakarta)\"
        required: true
        default: \"Asia/Jakarta\"

jobs:
  build:
    name: Build Kernel (${{ github.event.inputs.KERNEL_NAME }} - ${{ github.event.inputs.DEVICE_CODENAME }})
    runs-on: ubuntu-22.04

    env:
      ARCH: arm64
      SUBARCH: arm64
      KBUILD_BUILD_USER: ${{ github.event.inputs.KBUILD_USER }}
      KBUILD_BUILD_HOST: github-actions
      KERNEL_NAME: ${{ github.event.inputs.KERNEL_NAME }}
      DEVICE_CODENAME: ${{ github.event.inputs.DEVICE_CODENAME }}
      DEFCONFIG: ${{ github.event.inputs.KERNEL_DEFCONFIG }}
      USE_KSU: ${{ github.event.inputs.KERNELSU_NEXT }}
      USE_AK3: ${{ github.event.inputs.USE_ANYKERNEL }}
      AK3_URL: ${{ github.event.inputs.ANYKERNEL_SOURCE }}
      AK3_BRANCH: ${{ github.event.inputs.ANYKERNEL_BRANCH }}
      TOOLCHAIN_CHOICE: ${{ github.event.inputs.TOOLCHAIN }}
      TZ: ${{ github.event.inputs.TIMEZONE }}

    steps:
      # ---------------------------------------------------------------
      # 1. Setup Environment
      # ---------------------------------------------------------------
      - name: Set Timezone
        run: |
          sudo timedatectl set-timezone \"${TZ}\" || true
          echo \"TZ=${TZ}\" >> $GITHUB_ENV
          echo \"BUILD_DATE=$(TZ=${TZ} date +%Y%m%d)\" >> $GITHUB_ENV
          echo \"BUILD_TIME=$(TZ=${TZ} date +%H%M)\" >> $GITHUB_ENV

      - name: Set Build Variant (KSU / NonKSU)
        run: |
          if [ \"${USE_KSU}\" = \"yes\" ]; then
            echo \"VARIANT=KSU\" >> $GITHUB_ENV
          else
            echo \"VARIANT=NonKSU\" >> $GITHUB_ENV
          fi

      - name: Install Build Dependencies
        run: |
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            bc bison build-essential ccache curl flex g++-multilib \
            gcc-multilib git gnupg gperf imagemagick lib32readline-dev \
            lib32z1-dev libelf-dev liblz4-tool libncurses5-dev \
            libsdl1.2-dev libssl-dev libwxgtk3.0-gtk3-dev libxml2 \
            libxml2-utils lzop pngcrush rsync schedtool squashfs-tools \
            xsltproc zip zlib1g-dev python3 python3-pip cpio kmod \
            device-tree-compiler libarchive-tools p7zip-full unzip wget \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi \
            libc6-dev-arm64-cross libc6-dev-armel-cross

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ github.event.inputs.DEVICE_CODENAME }}-${{ github.event.inputs.KERNEL_NAME }}
          max-size: 4G

      # ---------------------------------------------------------------
      # 2. Clone Kernel Source
      # ---------------------------------------------------------------
      - name: Clone Kernel Source
        run: |
          echo \"==> Cloning kernel source...\"
          git clone --depth=1 --recurse-submodules \
            -b \"${{ github.event.inputs.KERNEL_SOURCE_BRANCH }}\" \
            \"${{ github.event.inputs.KERNEL_SOURCE_URL }}\" kernel
          cd kernel
          echo \"KERNEL_DIR=$(pwd)\" >> $GITHUB_ENV

      - name: Detect Kernel Version
        run: |
          cd \"${KERNEL_DIR}\"
          KV_MAJOR=$(grep -E '^VERSION\s*=' Makefile | head -1 | awk '{print $3}')
          KV_MINOR=$(grep -E '^PATCHLEVEL\s*=' Makefile | head -1 | awk '{print $3}')
          KV_SUB=$(grep -E '^SUBLEVEL\s*=' Makefile | head -1 | awk '{print $3}')
          KERNEL_VERSION=\"${KV_MAJOR}.${KV_MINOR}\"
          echo \"KERNEL_VERSION=${KERNEL_VERSION}\" >> $GITHUB_ENV
          echo \"KERNEL_VERSION_FULL=${KV_MAJOR}.${KV_MINOR}.${KV_SUB}\" >> $GITHUB_ENV
          echo \"==> Detected kernel version: ${KERNEL_VERSION_FULL:-${KERNEL_VERSION}}\"

      # ---------------------------------------------------------------
      # 3. Setup Toolchain (auto-detect terbaik per versi kernel)
      # ---------------------------------------------------------------
      - name: Resolve Toolchain
        id: resolve_tc
        run: |
          CHOICE=\"${TOOLCHAIN_CHOICE}\"
          KV=\"${KERNEL_VERSION}\"

          if [ \"${CHOICE}\" = \"auto\" ]; then
            case \"${KV}\" in
              \"4.9\")
                CHOICE=\"neutron-clang\"
                ;;
              \"4.14\")
                CHOICE=\"aosp-clang\"
                ;;
              \"4.19\")
                CHOICE=\"aosp-clang\"
                ;;
              *)
                CHOICE=\"neutron-clang\"
                ;;
            esac
          fi

          echo \"==> Kernel ${KV} -> Toolchain: ${CHOICE}\"
          echo \"TC_NAME=${CHOICE}\" >> $GITHUB_ENV

      - name: Setup AOSP Clang + GCC (Google)
        if: env.TC_NAME == 'aosp-clang'
        run: |
          set -e
          mkdir -p \"$HOME/toolchains/clang\" \"$HOME/toolchains/gcc64\" \"$HOME/toolchains/gcc32\"

          # AOSP Clang version per kernel version (stabil, verified)
          case \"${KERNEL_VERSION}\" in
            \"4.19\")
              CLANG_TAG=\"r487747c\"       # clang-r487747c (Android 14)
              ;;
            \"4.14\")
              CLANG_TAG=\"r450784d\"       # clang-r450784d (Android 13)
              ;;
            *)
              CLANG_TAG=\"r383902\"        # clang-r383902 (Android 11) untuk 4.9
              ;;
          esac

          echo \"==> Downloading AOSP Clang ${CLANG_TAG}...\"
          CLANG_URL=\"https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master/clang-${CLANG_TAG}.tar.gz\"
          if ! curl -Lf --retry 3 -o /tmp/clang.tar.gz \"${CLANG_URL}\"; then
            echo \"==> Fallback ke mirror kdrag0n/proton-clang untuk safety...\"
            git clone --depth=1 https://github.com/kdrag0n/proton-clang \"$HOME/toolchains/clang\"
          else
            tar -xzf /tmp/clang.tar.gz -C \"$HOME/toolchains/clang\"
          fi

          # GCC 64-bit & 32-bit dari arter97 (stabil untuk kernel 4.9/4.14/4.19)
          echo \"==> Downloading arter97 GCC (aarch64 + arm)...\"
          git clone --depth=1 https://github.com/mvaisakh/gcc-arm64 \"$HOME/toolchains/gcc64\" \
            || git clone --depth=1 https://github.com/arter97/arm64-gcc \"$HOME/toolchains/gcc64\"
          git clone --depth=1 https://github.com/mvaisakh/gcc-arm \"$HOME/toolchains/gcc32\" \
            || git clone --depth=1 https://github.com/arter97/arm32-gcc \"$HOME/toolchains/gcc32\"

          CLANG_BIN=\"$HOME/toolchains/clang/bin\"
          GCC64_BIN=\"$HOME/toolchains/gcc64/bin\"
          GCC32_BIN=\"$HOME/toolchains/gcc32/bin\"

          echo \"PATH=${CLANG_BIN}:${GCC64_BIN}:${GCC32_BIN}:${PATH}\" >> $GITHUB_ENV
          echo \"CLANG_BIN=${CLANG_BIN}\" >> $GITHUB_ENV
          echo \"GCC64_BIN=${GCC64_BIN}\" >> $GITHUB_ENV
          echo \"GCC32_BIN=${GCC32_BIN}\" >> $GITHUB_ENV
          echo \"TC_LABEL=AOSP-Clang-${CLANG_TAG}\" >> $GITHUB_ENV

      - name: Setup Neutron Clang
        if: env.TC_NAME == 'neutron-clang'
        run: |
          set -e
          mkdir -p \"$HOME/toolchains/neutron\"
          cd \"$HOME/toolchains/neutron\"
          echo \"==> Downloading Neutron Clang via antman...\"
          curl -LO \"https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman\"
          chmod +x antman
          # Pilih versi Neutron yang cocok:
          # - 10052023 stabil untuk kernel 4.9/4.14
          # - latest untuk 4.19+
          if [ \"${KERNEL_VERSION}\" = \"4.9\" ] || [ \"${KERNEL_VERSION}\" = \"4.14\" ]; then
            ./antman -S=10052023 || ./antman -S
          else
            ./antman -S
          fi
          ./antman --patch=glibc || true

          CLANG_BIN=\"$HOME/toolchains/neutron/bin\"
          echo \"PATH=${CLANG_BIN}:${PATH}\" >> $GITHUB_ENV
          echo \"CLANG_BIN=${CLANG_BIN}\" >> $GITHUB_ENV
          echo \"GCC64_BIN=${CLANG_BIN}\" >> $GITHUB_ENV
          echo \"GCC32_BIN=${CLANG_BIN}\" >> $GITHUB_ENV
          echo \"TC_LABEL=Neutron-Clang\" >> $GITHUB_ENV

      - name: Setup Proton Clang
        if: env.TC_NAME == 'proton-clang'
        run: |
          set -e
          echo \"==> Cloning Proton Clang...\"
          git clone --depth=1 https://github.com/kdrag0n/proton-clang \"$HOME/toolchains/proton\"

          CLANG_BIN=\"$HOME/toolchains/proton/bin\"
          echo \"PATH=${CLANG_BIN}:${PATH}\" >> $GITHUB_ENV
          echo \"CLANG_BIN=${CLANG_BIN}\" >> $GITHUB_ENV
          echo \"GCC64_BIN=${CLANG_BIN}\" >> $GITHUB_ENV
          echo \"GCC32_BIN=${CLANG_BIN}\" >> $GITHUB_ENV
          echo \"TC_LABEL=Proton-Clang\" >> $GITHUB_ENV

      - name: Verify Toolchain
        run: |
          which clang || true
          clang --version || true
          which aarch64-linux-gnu-ld || which ld.lld || true
          ld.lld --version || true

      # ---------------------------------------------------------------
      # 4. Apply KernelSU-Next Patch (Official)
      # ---------------------------------------------------------------
      - name: Apply KernelSU-Next
        if: env.USE_KSU == 'yes'
        run: |
          set -e
          cd \"${KERNEL_DIR}\"
          echo \"==> Applying Official KernelSU-Next...\"
          # Bersihkan direktori KernelSU lama jika ada
          rm -rf KernelSU KernelSU-Next drivers/kernelsu
          curl -LSs \"https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh\" | bash -s next

          # Pastikan Kconfig & Makefile drivers include KernelSU (idempotent)
          if [ -f drivers/Kconfig ] && ! grep -q \"kernelsu\" drivers/Kconfig; then
            sed -i '/endmenu/i source \"drivers/kernelsu/Kconfig\"' drivers/Kconfig || true
          fi
          if [ -f drivers/Makefile ] && ! grep -q \"kernelsu\" drivers/Makefile; then
            echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          fi

          # Enable KSU pada defconfig
          DEFCONFIG_PATH=\"arch/${ARCH}/configs/${DEFCONFIG}\"
          if [ -f \"${DEFCONFIG_PATH}\" ]; then
            sed -i '/CONFIG_KSU/d' \"${DEFCONFIG_PATH}\"
            {
              echo \"CONFIG_KSU=y\"
              echo \"CONFIG_KSU_SUSFS=n\"
              echo \"CONFIG_KPROBES=y\"
              echo \"CONFIG_HAVE_KPROBES=y\"
              echo \"CONFIG_KPROBE_EVENTS=y\"
            } >> \"${DEFCONFIG_PATH}\"
          fi

      # ---------------------------------------------------------------
      # 5. Prepare Build Flags (anti stack-protector / vDSO error)
      # ---------------------------------------------------------------
      - name: Prepare Build Flags
        run: |
          cd \"${KERNEL_DIR}\"

          # Nonaktifkan werror global untuk hindari failure di kernel lama
          export KCFLAGS=\"-Wno-error\"
          echo \"KCFLAGS=-Wno-error\" >> $GITHUB_ENV

          # Untuk mencegah stack protector error di kernel 4.9/4.14 saat cross-compile
          # kernel butuh gcc dengan -fstack-protector-strong support. AOSP GCC/arter97 sudah cukup.
          # vDSO error umumnya karena clang triple salah -> kita set CLANG_TRIPLE eksplisit.

          echo \"MAKE_ARGS_BASE=ARCH=${ARCH} SUBARCH=${SUBARCH} O=out\" >> $GITHUB_ENV

      # ---------------------------------------------------------------
      # 6. Build Kernel
      # ---------------------------------------------------------------
      - name: Make Defconfig
        run: |
          cd \"${KERNEL_DIR}\"
          make ${MAKE_ARGS_BASE} \"${DEFCONFIG}\"

      - name: Build Kernel Image
        id: build_kernel
        run: |
          set -e
          cd \"${KERNEL_DIR}\"

          THREADS=$(nproc --all)
          echo \"==> Building with ${THREADS} threads using ${TC_LABEL}\"

          # Set up compiler args berdasarkan toolchain
          COMMON_ARGS=\"ARCH=${ARCH} SUBARCH=${SUBARCH} O=out \
            KBUILD_BUILD_USER=${KBUILD_BUILD_USER} \
            KBUILD_BUILD_HOST=${KBUILD_BUILD_HOST}\"

          # Cari prefix cross compile yang tersedia (hindari error 404 toolchain)
          if [ -x \"${GCC64_BIN}/aarch64-linux-android-ld\" ]; then
            CC_AARCH64=\"aarch64-linux-android-\"
          elif [ -x \"${GCC64_BIN}/aarch64-elf-ld\" ]; then
            CC_AARCH64=\"aarch64-elf-\"
          elif [ -x \"${GCC64_BIN}/aarch64-linux-gnu-ld\" ]; then
            CC_AARCH64=\"aarch64-linux-gnu-\"
          else
            CC_AARCH64=\"aarch64-linux-gnu-\"
          fi

          if [ -x \"${GCC32_BIN}/arm-linux-androideabi-ld\" ]; then
            CC_ARM32=\"arm-linux-androideabi-\"
          elif [ -x \"${GCC32_BIN}/arm-eabi-ld\" ]; then
            CC_ARM32=\"arm-eabi-\"
          elif [ -x \"${GCC32_BIN}/arm-linux-gnueabi-ld\" ]; then
            CC_ARM32=\"arm-linux-gnueabi-\"
          else
            CC_ARM32=\"arm-linux-gnueabi-\"
          fi

          echo \"==> CROSS_COMPILE=${CC_AARCH64}\"
          echo \"==> CROSS_COMPILE_ARM32=${CC_ARM32}\"

          make -j${THREADS} ${COMMON_ARGS} \
            CC=clang \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            READELF=llvm-readelf \
            HOSTCC=clang \
            HOSTCXX=clang++ \
            HOSTAR=llvm-ar \
            HOSTLD=ld.lld \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=\"${CC_AARCH64}\" \
            CROSS_COMPILE_ARM32=\"${CC_ARM32}\" \
            CROSS_COMPILE_COMPAT=\"${CC_ARM32}\" \
            LLVM=1 LLVM_IAS=1 \
            KCFLAGS=\"${KCFLAGS}\" \
            2>&1 | tee build.log

          # Verifikasi output
          OUT_DIR=\"${KERNEL_DIR}/out/arch/${ARCH}/boot\"
          if [ -f \"${OUT_DIR}/Image.gz-dtb\" ]; then
            KERNEL_IMG=\"${OUT_DIR}/Image.gz-dtb\"
          elif [ -f \"${OUT_DIR}/Image.gz\" ]; then
            KERNEL_IMG=\"${OUT_DIR}/Image.gz\"
          elif [ -f \"${OUT_DIR}/Image-dtb\" ]; then
            KERNEL_IMG=\"${OUT_DIR}/Image-dtb\"
          elif [ -f \"${OUT_DIR}/Image\" ]; then
            KERNEL_IMG=\"${OUT_DIR}/Image\"
          else
            echo \"::error::Kernel image tidak ditemukan di ${OUT_DIR}\"
            ls -la \"${OUT_DIR}\" || true
            exit 1
          fi

          echo \"KERNEL_IMG=${KERNEL_IMG}\" >> $GITHUB_ENV
          echo \"OUT_DIR=${OUT_DIR}\" >> $GITHUB_ENV
          echo \"==> Kernel image: ${KERNEL_IMG}\"

      # ---------------------------------------------------------------
      # 7. Package dengan AnyKernel3 (jika enable)
      # ---------------------------------------------------------------
      - name: Set Output Filename
        run: |
          ZIP_NAME=\"${KERNEL_NAME}-${DEVICE_CODENAME}-${VARIANT}-${BUILD_DATE}.zip\"
          echo \"ZIP_NAME=${ZIP_NAME}\" >> $GITHUB_ENV
          echo \"==> Output filename: ${ZIP_NAME}\"

      - name: Package with AnyKernel3
        if: env.USE_AK3 == 'yes'
        run: |
          set -e
          cd \"$GITHUB_WORKSPACE\"
          echo \"==> Cloning AnyKernel3: ${AK3_URL} (${AK3_BRANCH})\"
          git clone --depth=1 -b \"${AK3_BRANCH}\" \"${AK3_URL}\" AnyKernel3

          # Salin kernel image ke root AnyKernel3
          cp \"${KERNEL_IMG}\" AnyKernel3/

          # Salin dtbo jika ada
          if [ -f \"${OUT_DIR}/dtbo.img\" ]; then
            cp \"${OUT_DIR}/dtbo.img\" AnyKernel3/
          fi
          # Salin dtb jika ada
          if [ -f \"${OUT_DIR}/dtb.img\" ]; then
            cp \"${OUT_DIR}/dtb.img\" AnyKernel3/
          fi

          cd AnyKernel3
          rm -rf .git .github README.md
          zip -r9 \"../${ZIP_NAME}\" ./*
          cd ..
          echo \"ZIP_PATH=$GITHUB_WORKSPACE/${ZIP_NAME}\" >> $GITHUB_ENV

      - name: Package Raw Image (tanpa AnyKernel3)
        if: env.USE_AK3 == 'no'
        run: |
          set -e
          cd \"$GITHUB_WORKSPACE\"
          mkdir -p raw_output
          cp \"${KERNEL_IMG}\" raw_output/
          [ -f \"${OUT_DIR}/dtbo.img\" ] && cp \"${OUT_DIR}/dtbo.img\" raw_output/ || true
          [ -f \"${OUT_DIR}/dtb.img\" ] && cp \"${OUT_DIR}/dtb.img\" raw_output/ || true
          cd raw_output
          zip -r9 \"../${ZIP_NAME}\" ./*
          cd ..
          echo \"ZIP_PATH=$GITHUB_WORKSPACE/${ZIP_NAME}\" >> $GITHUB_ENV

      # ---------------------------------------------------------------
      # 8. Upload Artifact + Release
      # ---------------------------------------------------------------
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_PATH }}
          if-no-files-found: error

      - name: Upload Build Log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ env.BUILD_DATE }}-${{ env.BUILD_TIME }}
          path: ${{ env.KERNEL_DIR }}/build.log
          if-no-files-found: ignore

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.KERNEL_NAME }}-${{ env.DEVICE_CODENAME }}-${{ env.VARIANT }}-${{ env.BUILD_DATE }}-${{ env.BUILD_TIME }}
          name: ${{ env.KERNEL_NAME }} ${{ env.DEVICE_CODENAME }} (${{ env.VARIANT }}) - ${{ env.BUILD_DATE }}
          body: |
            ## ${{ env.KERNEL_NAME }} for ${{ env.DEVICE_CODENAME }}

            | Info | Value |
            |------|-------|
            | Device Codename | `${{ env.DEVICE_CODENAME }}` |
            | Variant | `${{ env.VARIANT }}` |
            | KernelSU-Next | `${{ env.USE_KSU }}` |
            | AnyKernel3 | `${{ env.USE_AK3 }}` |
            | Toolchain | `${{ env.TC_LABEL }}` |
            | Kernel Version | `${{ env.KERNEL_VERSION_FULL }}` |
            | Defconfig | `${{ env.DEFCONFIG }}` |
            | KBuild User | `${{ env.KBUILD_BUILD_USER }}` |
            | Build Date | `${{ env.BUILD_DATE }} ${{ env.BUILD_TIME }} (${{ env.TZ }})` |

  
