name: Start Your Build

on:
  workflow_dispatch:
    inputs:
      KERNEL_SOURCE:
        description: "FORMAT WAJIB: owner/repo (contoh: LineageOS/android_kernel_xiaomi_mido)"
        required: true
        type: string

      KERNEL_BRANCH:
        required: true
        type: string

      KERNEL_DEFCONFIG:
        required: true
        type: string

      DEVICE_CODENAME:
        required: true
        type: string

      KERNEL_VERSION:
        required: true
        type: string

      KERNEL_NAME:
        required: true
        type: string

      KBUILD_USER:
        required: true
        type: string

      USE_ANYKERNEL:
        required: true
        type: string
        default: "true"

      USE_KSU_NEXT:
        required: true
        type: string
        default: "false"

      ANYKERNEL_SOURCE:
        required: false
        type: string

      ANYKERNEL_BRANCH:
        required: false
        type: string
        default: "master"

env:
  TZ: Asia/Jakarta
  ARCH: arm64
  SUBARCH: arm64

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:

    # =========================
    # CHECKOUT KERNEL
    # =========================
    - name: Checkout Kernel
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.KERNEL_SOURCE }}
        ref: ${{ inputs.KERNEL_BRANCH }}
        submodules: recursive

    # =========================
    # DEPENDENCIES (FIXED LLD + LLVM)
    # =========================
    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y \
          bc bison build-essential ccache curl flex git zip unzip \
          libssl-dev libelf-dev python3 clang lld llvm gcc-multilib

    # =========================
    # TOOLCHAIN FIX (ANTI ld.lld NOT FOUND)
    # =========================
    - name: Setup Toolchain FIXED
      run: |
        mkdir -p toolchain

        git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 toolchain/clang

        CLANG_DIR=$(find toolchain/clang -maxdepth 2 -type d -name "clang-r*" | head -n 1)

        echo "CLANG_DIR=$CLANG_DIR"

        echo "$CLANG_DIR/bin" >> $GITHUB_PATH

        echo "KBUILD_BUILD_USER=${{ inputs.KBUILD_USER }}" >> $GITHUB_ENV
        echo "KBUILD_BUILD_HOST=GitHubCI" >> $GITHUB_ENV

        # CRITICAL FIXES
        echo "LD=ld.lld" >> $GITHUB_ENV
        echo "CROSS_COMPILE_ARM32=arm-linux-androideabi-" >> $GITHUB_ENV

    # =========================
    # DEFCONFIG
    # =========================
    - name: Defconfig
      run: |
        make O=out ARCH=arm64 ${{ inputs.KERNEL_DEFCONFIG }}
        make O=out ARCH=arm64 olddefconfig

    # =========================
    # 🔥 AUTO FIX CONFIG (STACKPROTECTOR ISSUE)
    # =========================
    - name: Auto Fix Config (CLANG SAFE PATCH)
      run: |
        echo "[*] Fixing compiler incompat config..."

        scripts/config --file out/.config \
          -d CC_STACKPROTECTOR_STRONG \
          -e CC_STACKPROTECTOR_NONE || true

        make O=out ARCH=arm64 olddefconfig

    # =========================
    # KSU-NEXT (SAFE INJECT AFTER CONFIG STABLE)
    # =========================
    - name: Apply KernelSU-Next
      if: inputs.USE_KSU_NEXT == 'true'
      run: |
        echo "[*] Injecting KernelSU-Next AFTER config stabilization"
        curl -LSs https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh | bash -s legacy

    # =========================
    # POST KSU FIX (IMPORTANT)
    # =========================
    - name: Post-KSU Config Fix
      if: inputs.USE_KSU_NEXT == 'true'
      run: |
        scripts/config --file out/.config \
          -d CC_STACKPROTECTOR_STRONG \
          -e CC_STACKPROTECTOR_NONE || true

        make O=out ARCH=arm64 olddefconfig

    # =========================
    # BUILD
    # =========================
    - name: Build Kernel
      run: |
        make -j$(nproc) O=out ARCH=arm64 \
          CC=clang \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip \
          CROSS_COMPILE_ARM32=arm-linux-androideabi-

    # =========================
    # PREP ANYKERNEL IMAGE
    # =========================
    - name: Prepare Image
      run: |
        mkdir -p anykernel

        if [ -f "out/arch/arm64/boot/Image.gz-dtb" ]; then
          cp out/arch/arm64/boot/Image.gz-dtb anykernel/Image.gz-dtb
        elif [ -f "out/arch/arm64/boot/Image.gz" ]; then
          cp out/arch/arm64/boot/Image.gz anykernel/Image.gz-dtb
        else
          cp out/arch/arm64/boot/Image anykernel/Image.gz-dtb
        fi

    # =========================
    # ANYKERNEL
    # =========================
    - name: Clone AnyKernel
      if: inputs.USE_ANYKERNEL == 'true'
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.ANYKERNEL_SOURCE }}
        ref: ${{ inputs.ANYKERNEL_BRANCH }}
        path: anykernel_src

    - name: Inject Image
      if: inputs.USE_ANYKERNEL == 'true'
      run: |
        cp anykernel/Image.gz-dtb anykernel_src/

    # =========================
    # PACKAGE
    # =========================
    - name: Build ZIP
      run: |
        DATE=$(date +%Y%m%d)
        ZIP="${{ inputs.KERNEL_NAME }}-${{ inputs.KERNEL_VERSION }}-${{ inputs.DEVICE_CODENAME }}-${DATE}.zip"

        if [ "${{ inputs.USE_ANYKERNEL }}" = "true" ]; then
          cd anykernel_src
          zip -r9 "../$ZIP" . -x "*.git*" "README*" "LICENSE*"
        else
          cd anykernel
          zip -r9 "../$ZIP" Image.gz-dtb
        fi

        mv "../$ZIP" ../artifact.zip

    # =========================
    # ARTIFACT
    # =========================
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kernel-build
        path: artifact.zip

    # =========================
    # GITHUB RELEASE (STABLE)
    # =========================
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.KERNEL_NAME }}-${{ inputs.KERNEL_VERSION }}-${{ github.run_number }}
        name: "${{ inputs.KERNEL_NAME }} ${KERNEL_VERSION}"
        files: artifact.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # =========================
    # SUMMARY
    # =========================
    - name: Summary
      run: |
        echo "=========================="
        echo "BUILD SUCCESS (PRO FLOW)"
        echo "KSU: ${{ inputs.USE_KSU_NEXT }}"
        echo "ANYKERNEL: ${{ inputs.USE_ANYKERNEL }}"
        echo "RELEASE: READY"
        echo "=========================="
