name: Build Android Kernel with vDSO compatibility (FIXED)

on:
  workflow_dispatch:
    inputs:
      KERNEL_SOURCE:
        description: 'Kernel Source URL'
        required: true
        type: string

      KERNEL_BRANCH:
        required: true
        type: string

      KERNEL_DEFCONFIG:
        required: true
        type: string

      DEVICE_CODENAME:
        required: true
        type: string

      KERNEL_VERSION:
        required: true
        type: string

      KERNEL_NAME:
        required: true
        type: string

      KBUILD_USER:
        required: true
        type: string

      USE_ANYKERNEL:
        required: true
        type: string
        default: "true"

      ANYKERNEL_SOURCE:
        required: false
        type: string

      ANYKERNEL_BRANCH:
        required: false
        type: string
        default: "master"

env:
  TZ: Asia/Jakarta

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:

      # =========================
      # PARSE KERNEL REPO
      # =========================
      - name: Parse Kernel Source
        id: parse_kernel
        run: |
          REPO=$(echo "${{ inputs.KERNEL_SOURCE }}" | sed 's|https://github.com/||' | sed 's|http://github.com/||' | sed 's|github.com/||' | sed 's|\.git$||')
          echo "repo=$REPO" >> $GITHUB_OUTPUT

      # =========================
      # CHECKOUT KERNEL
      # =========================
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.parse_kernel.outputs.repo }}
          ref: ${{ inputs.KERNEL_BRANCH }}
          submodules: recursive
          fetch-depth: 1

      # =========================
      # DEPENDENCIES
      # =========================
      - name: Setup Build Environment
        run: |
          sudo apt-get update -y
          sudo apt-get install -y bc bison build-essential ccache curl flex \
          g++-multilib gcc-multilib git libelf-dev libssl-dev zip python3

      # =========================
      # TOOLCHAIN
      # =========================
      - name: Setup Toolchain
        run: |
          mkdir -p toolchain
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 toolchain/clang

          echo "ARCH=arm64" >> $GITHUB_ENV
          echo "SUBARCH=arm64" >> $GITHUB_ENV
          echo "KBUILD_BUILD_USER=${{ inputs.KBUILD_USER }}" >> $GITHUB_ENV
          echo "KBUILD_BUILD_HOST=GitHub-Actions" >> $GITHUB_ENV
          echo "PATH=$PWD/toolchain/clang/clang-r*/bin:$PATH" >> $GITHUB_ENV

      # =========================
      # DEFCONFIG
      # =========================
      - name: Generate Defconfig
        run: |
          make O=out ARCH=arm64 ${{ inputs.KERNEL_DEFCONFIG }}

      # =========================
      # BUILD KERNEL
      # =========================
      - name: Build Kernel
        run: |
          make -j$(nproc --all) O=out ARCH=arm64 \
          CC=clang \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip

      # =========================
      # PREP ANYKERNEL ROOT
      # =========================
      - name: Prepare Kernel Image (FIXED)
        run: |
          mkdir -p $GITHUB_WORKSPACE/anykernel

          if [ -f "out/arch/arm64/boot/Image.gz-dtb" ]; then
            echo "[+] Using Image.gz-dtb"
            cp out/arch/arm64/boot/Image.gz-dtb $GITHUB_WORKSPACE/anykernel/Image.gz-dtb

          elif [ -f "out/arch/arm64/boot/Image.gz" ]; then
            echo "[!] fallback Image.gz"
            cp out/arch/arm64/boot/Image.gz $GITHUB_WORKSPACE/anykernel/Image.gz-dtb

          else
            echo "[!] fallback Image"
            cp out/arch/arm64/boot/Image $GITHUB_WORKSPACE/anykernel/Image.gz-dtb
          fi

      # =========================
      # CHECK ANYKERNEL
      # =========================
      - name: Clone AnyKernel3
        if: inputs.USE_ANYKERNEL == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.ANYKERNEL_SOURCE }}
          ref: ${{ inputs.ANYKERNEL_BRANCH }}
          path: anykernel

      # =========================
      # MOVE IMAGE INTO ANYKERNEL
      # =========================
      - name: Setup AnyKernel
        if: inputs.USE_ANYKERNEL == 'true'
        run: |
          cp $GITHUB_WORKSPACE/anykernel/Image.gz-dtb $GITHUB_WORKSPACE/anykernel/

      # =========================
      # PACKAGE (ANTI ZIP-IN-ZIP FIX)
      # =========================
      - name: Create Flashable ZIP (FIXED)
        if: inputs.USE_ANYKERNEL == 'true'
        run: |
          cd $GITHUB_WORKSPACE/anykernel

          sed -i "s/device.name1=.*/device.name1=${{ inputs.DEVICE_CODENAME }}/g" anykernel.sh 2>/dev/null || true
          sed -i "s/kernel.string=.*/kernel.string=${{ inputs.KERNEL_NAME }} ${{ inputs.KERNEL_VERSION }}/g" anykernel.sh 2>/dev/null || true

          DATE=$(date +%Y%m%d)
          ZIP_NAME="${{ inputs.KERNEL_NAME }}-${{ inputs.KERNEL_VERSION }}-${{ inputs.DEVICE_CODENAME }}-${DATE}.zip"

          zip -r9 "../$ZIP_NAME" . -x "*.git*" "README*" "LICENSE*"

          mv "../$ZIP_NAME" $GITHUB_WORKSPACE/artifacts.zip

          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      # =========================
      # RAW ZIP MODE (NO ANYKERNEL)
      # =========================
      - name: Create Raw Kernel ZIP
        if: inputs.USE_ANYKERNEL != 'true'
        run: |
          mkdir -p artifacts

          DATE=$(date +%Y%m%d)
          ZIP_NAME="${{ inputs.KERNEL_NAME }}-${{ inputs.KERNEL_VERSION }}-${{ inputs.DEVICE_CODENAME }}-${DATE}.zip"

          cd $GITHUB_WORKSPACE/anykernel
          zip -r9 "../$ZIP_NAME" Image.gz-dtb

          mv "../$ZIP_NAME" $GITHUB_WORKSPACE/artifacts.zip

          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      # =========================
      # UPLOAD RELEASE (OPTIONAL)
      # =========================
      - name: Upload Artifact (DEBUG)
        uses: actions/upload-artifact@v4
        with:
          name: kernel-build
          path: $GITHUB_WORKSPACE/artifacts.zip
          if-no-files-found: error

      # =========================
      # BUILD SUMMARY
      # =========================
      - name: Build Summary
        run: |
          echo "=============================="
          echo "BUILD SUCCESS"
          echo "Device: ${{ inputs.DEVICE_CODENAME }}"
          echo "Kernel: ${{ inputs.KERNEL_NAME }}"
          echo "Version: ${{ inputs.KERNEL_VERSION }}"
          echo "Output: artifacts.zip"
          echo "=============================="
