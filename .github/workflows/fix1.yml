name: Kernel Build PRO MAX FIX + AUTO RECOVERY

on:
  workflow_dispatch:
    inputs:
      KERNEL_SOURCE:
        required: true
        type: string
      KERNEL_BRANCH:
        required: true
        type: string
      KERNEL_DEFCONFIG:
        required: true
        type: string
      DEVICE_CODENAME:
        required: true
        type: string
      KERNEL_VERSION:
        required: true
        type: string
      KERNEL_NAME:
        required: true
        type: string
      KBUILD_USER:
        required: true
        type: string
      USE_ANYKERNEL:
        required: true
        type: string
        default: "true"
      USE_KSU_NEXT:
        required: true
        type: string
        default: "false"
      ANYKERNEL_SOURCE:
        required: false
        type: string
      ANYKERNEL_BRANCH:
        required: false
        type: string
        default: "master"

env:
  TZ: Asia/Jakarta
  ARCH: arm64
  SUBARCH: arm64

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:

    # =========================
    # CLONE KERNEL
    # =========================
    - name: Checkout Kernel
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.KERNEL_SOURCE }}
        ref: ${{ inputs.KERNEL_BRANCH }}
        submodules: recursive

    # =========================
    # DEPENDENCIES (FIXED LLVM STACK)
    # =========================
    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y \
          bc bison build-essential ccache curl flex git zip unzip \
          libssl-dev libelf-dev python3 clang lld llvm gcc-multilib

    # =========================
    # TOOLCHAIN (FORCE WORKING CLANG + LLD FIX)
    # =========================
    - name: Setup Toolchain (FIX LLD + ARM32)
      run: |
        mkdir -p toolchain

        git clone --depth=1 \
          https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 \
          toolchain/clang

        git clone --depth=1 \
          https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 \
          toolchain/gcc32

        CLANG_DIR=$(find toolchain/clang -maxdepth 2 -type d -name "clang-r*" | head -n 1)

        echo "CLANG_DIR=$CLANG_DIR"

        echo "$CLANG_DIR/bin" >> $GITHUB_PATH

        echo "KBUILD_BUILD_USER=${{ inputs.KBUILD_USER }}" >> $GITHUB_ENV
        echo "KBUILD_BUILD_HOST=GitHubCI" >> $GITHUB_ENV

        # 🔥 FIX KRITIS SEMUA ERROR LO
        echo "CROSS_COMPILE_ARM32=arm-linux-androideabi-" >> $GITHUB_ENV
        echo "LD=ld.lld" >> $GITHUB_ENV

    # =========================
    # KSU-NEXT PATCH (OPTIONAL)
    # =========================
    - name: Apply KernelSU-Next
      if: inputs.USE_KSU_NEXT == 'true'
      run: |
        curl -LSs https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh | bash -s legacy

    # =========================
    # DEFCONFIG
    # =========================
    - name: Defconfig
      run: |
        make O=out ARCH=arm64 ${{ inputs.KERNEL_DEFCONFIG }}

    # =========================
    # 🔥 AUTO RECOVERY PATCH (FIX STACKPROTECTOR ERROR)
    # =========================
    - name: Auto Fix Config if Needed
      run: |
        echo "[*] Checking kernel config sanity..."

        # FIX STACKPROTECTOR ERROR (INI BIANG ERROR LO)
        scripts/config --file out/.config \
          -d CC_STACKPROTECTOR_STRONG \
          -e CC_STACKPROTECTOR_NONE || true

        # fallback safety
        scripts/config --file out/.config \
          -e STACKPROTECTOR || true

        make O=out ARCH=arm64 olddefconfig

    # =========================
    # BUILD KERNEL (STABLE MODE)
    # =========================
    - name: Build Kernel
      run: |
        make -j$(nproc) O=out ARCH=arm64 \
          CC=clang \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip \
          CROSS_COMPILE_ARM32=arm-linux-androideabi-

    # =========================
    # PREP ANYKERNEL
    # =========================
    - name: Prepare Image
      run: |
        mkdir -p anykernel

        if [ -f "out/arch/arm64/boot/Image.gz-dtb" ]; then
          cp out/arch/arm64/boot/Image.gz-dtb anykernel/Image.gz-dtb
        elif [ -f "out/arch/arm64/boot/Image.gz" ]; then
          cp out/arch/arm64/boot/Image.gz anykernel/Image.gz-dtb
        else
          cp out/arch/arm64/boot/Image anykernel/Image.gz-dtb
        fi

    # =========================
    # ANYKERNEL
    # =========================
    - name: Clone AnyKernel
      if: inputs.USE_ANYKERNEL == 'true'
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.ANYKERNEL_SOURCE }}
        ref: ${{ inputs.ANYKERNEL_BRANCH }}
        path: anykernel_src

    - name: Inject Kernel Image
      if: inputs.USE_ANYKERNEL == 'true'
      run: |
        cp anykernel/Image.gz-dtb anykernel_src/

    # =========================
    # ZIP BUILD (ANTI ZIP-IN-ZIP FIX)
    # =========================
    - name: Build ZIP
      run: |
        DATE=$(date +%Y%m%d)
        ZIP="${{ inputs.KERNEL_NAME }}-${{ inputs.KERNEL_VERSION }}-${{ inputs.DEVICE_CODENAME }}-${DATE}.zip"

        if [ "${{ inputs.USE_ANYKERNEL }}" = "true" ]; then
          cd anykernel_src
          zip -r9 "../$ZIP" . -x "*.git*" "README*" "LICENSE*"
        else
          cd anykernel
          zip -r9 "../$ZIP" Image.gz-dtb
        fi

        mv "../$ZIP" ../artifact.zip
        echo "ZIP_NAME=$ZIP" >> $GITHUB_ENV

    # =========================
    # ARTIFACT
    # =========================
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kernel-build
        path: artifact.zip

    # =========================
    # GH RELEASE (FINAL FIX)
    # =========================
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.KERNEL_NAME }}-${{ inputs.KERNEL_VERSION }}-${{ github.run_number }}
        name: "${{ inputs.KERNEL_NAME }} ${{ inputs.KERNEL_VERSION }}"
        files: artifact.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # =========================
    # SUMMARY
    # =========================
    - name: Summary
      run: |
        echo "=============================="
        echo "BUILD SUCCESS PRO MAX"
        echo "DEVICE: ${{ inputs.DEVICE_CODENAME }}"
        echo "KSU-NEXT: ${{ inputs.USE_KSU_NEXT }}"
        echo "RELEASE: READY"
        echo "=============================="
