name: 🚀 Kernel Builder

on:
  workflow_dispatch:
    inputs:
      kernel_source:
        description: '🔗 Kernel Source URL'
        required: true
        type: string
      kernel_branch:
        description: '🌿 Kernel Source Branch'
        required: true
        type: string
      defconfig:
        description: '⚙️ Kernel Defconfig'
        required: true
        type: string
      ksu_next:
        description: '🛡️ KernelSU Next Patch'
        required: true
        type: choice
        options:
          - 'yes'
          - 'no'
        default: 'no'
      kbuild_user:
        description: '👤 KBuild User'
        required: true
        type: string
      device_codename:
        description: '📱 Device Codename'
        required: true
        type: string
      kernel_name:
        description: '🏷️ Kernel Name'
        required: true
        type: string
      use_anykernel:
        description: '📦 Use AnyKernel3'
        required: true
        type: choice
        options:
          - 'yes'
          - 'no'
        default: 'yes'
      anykernel_source:
        description: '📦 AnyKernel Source URL (if Use AnyKernel = yes)'
        required: false
        type: string
      anykernel_branch:
        description: '🌿 AnyKernel Branch (if Use AnyKernel = yes)'
        required: false
        type: string
      timezone:
        description: '🌍 Timezone'
        required: false
        type: string
        default: 'Asia/Jakarta'

env:
  TZ: ${{ github.event.inputs.timezone }}

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: 📅 Setup Date & Time
        id: date
        run: |
          echo "DATE=$(date +'%d%m%Y')" >> $GITHUB_ENV
          echo "FULL_DATE=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV
          echo "📅 Build Date: $(date +'%Y-%m-%d %H:%M:%S')"

      - name: 🎉 Welcome Message
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║         🚀 Android Kernel Builder - GitHub Actions         ║"
          echo "╠════════════════════════════════════════════════════════════╣"
          echo "║  🔗 Kernel Source: ${{ github.event.inputs.kernel_source }}"
          echo "║  🌿 Branch: ${{ github.event.inputs.kernel_branch }}"
          echo "║  ⚙️  Defconfig: ${{ github.event.inputs.defconfig }}"
          echo "║  🛡️  KernelSU Next: ${{ github.event.inputs.ksu_next }}"
          echo "║  👤 KBuild User: ${{ github.event.inputs.kbuild_user }}"
          echo "║  📱 Device: ${{ github.event.inputs.device_codename }}"
          echo "║  🏷️  Kernel Name: ${{ github.event.inputs.kernel_name }}"
          echo "║  📦 AnyKernel: ${{ github.event.inputs.use_anykernel }}"
          echo "║  🌍 Timezone: ${{ github.event.inputs.timezone }}"
          echo "╚════════════════════════════════════════════════════════════╝"

      - name: 🧰 Install Dependencies
        run: |
          echo "🔧 Installing build dependencies..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq             bc bison build-essential ccache curl flex             git gnupg gperf imagemagick lib32ncurses5-dev             lib32readline-dev lib32z1-dev libc6-dev-i386             libelf-dev liblz4-tool libncurses5-dev libsdl1.2-dev             libssl-dev libxml2 libxml2-utils lzop pngcrush             rsync schedtool squashfs-tools xsltproc zip zlib1g-dev             libncurses5 libncursesw5 libtinfo5 python3 python3-pip             device-tree-compiler libbrotli-dev libzstd-dev             libarchive-tools zstd lld llvm 2>&1 | tail -n 5
          echo "✅ Dependencies installed successfully!"

      - name: 🔧 Setup Python & Packages
        run: |
          echo "🐍 Setting up Python environment..."
          pip3 install -q pyelftools 2>/dev/null || true
          sudo ln -sf /usr/bin/python3 /usr/bin/python 2>/dev/null || true
          echo "✅ Python setup complete!"

      - name: 📥 Clone Kernel Source
        run: |
          echo "📥 Cloning kernel source..."
          git clone --depth=1 -b ${{ github.event.inputs.kernel_branch }}             ${{ github.event.inputs.kernel_source }} kernel
          cd kernel
          echo "✅ Kernel source cloned!"
          echo "📂 Current directory: $(pwd)"
          echo "📋 Latest commit: $(git log --oneline -1)"

      - name: 🔍 Detect Kernel Version
        id: kver
        run: |
          cd kernel
          if [ -f Makefile ]; then
            KVER_MAJOR=$(grep -m1 "^VERSION = " Makefile | awk '{print $3}')
            KVER_MINOR=$(grep -m1 "^PATCHLEVEL = " Makefile | awk '{print $3}')
            KVER_PATCH=$(grep -m1 "^SUBLEVEL = " Makefile | awk '{print $3}')
            echo "KERNEL_VERSION=${KVER_MAJOR}.${KVER_MINOR}.${KVER_PATCH}" >> $GITHUB_ENV
            echo "KVER_MAJOR=${KVER_MAJOR}" >> $GITHUB_ENV
            echo "KVER_MINOR=${KVER_MINOR}" >> $GITHUB_ENV
            echo "🎯 Detected Kernel Version: ${KVER_MAJOR}.${KVER_MINOR}.${KVER_PATCH}"
          else
            echo "KERNEL_VERSION=unknown" >> $GITHUB_ENV
            echo "⚠️ Could not detect kernel version"
          fi

      - name: 🔧 Setup CPU Cluster Mask
        run: |
          echo "🔧 Setting up CPU cluster mask for device: ${{ github.event.inputs.device_codename }}"
          cd kernel

          # Detect if defconfig has CPU mask configs
          DEFCONFIG_PATH=""
          for path in             "arch/${{ env.ARCH }}/configs/${{ github.event.inputs.defconfig }}"             "arch/arm64/configs/${{ github.event.inputs.defconfig }}"             "arch/arm/configs/${{ github.event.inputs.defconfig }}"             "arch/${{ env.ARCH }}/configs/vendor/${{ github.event.inputs.defconfig }}"             "arch/arm64/configs/vendor/${{ github.event.inputs.defconfig }}"             "arch/arm/configs/vendor/${{ github.event.inputs.defconfig }}"; do
            if [ -f "$path" ]; then
              DEFCONFIG_PATH="$path"
              break
            fi
          done

          if [ -z "$DEFCONFIG_PATH" ]; then
            echo "⚠️ Defconfig not found for CPU mask setup, skipping..."
            exit 0
          fi

          # Check if CPU mask configs exist
          if grep -q "CONFIG_BIG_CPU_MASK\|CONFIG_LITTLE_CPU_MASK\|CONFIG_CPU_MASK" "$DEFCONFIG_PATH" 2>/dev/null; then
            echo "🎯 CPU mask config detected!"

            # Set CPU mask based on device codename
            DEVICE="${{ github.event.inputs.device_codename }}"

            case "$DEVICE" in
              lavender)
                # Snapdragon 660: 4x Kryo 260 Gold (big) + 4x Kryo 260 Silver (LITTLE)
                # big cores: 0-3, LITTLE cores: 4-7
                BIG_MASK="0F"
                LITTLE_MASK="F0"
                echo "📱 Device: $DEVICE (SDM660 - 4+4 cores)"
                ;;
              mido)
                # Snapdragon 625: 8x Cortex-A53 (symmetric, no big.LITTLE)
                BIG_MASK="FF"
                LITTLE_MASK="00"
                echo "📱 Device: $DEVICE (MSM8953 - 8x A53)"
                ;;
              whyred)
                # Snapdragon 636: 4x Kryo 260 Gold + 4x Kryo 260 Silver
                BIG_MASK="0F"
                LITTLE_MASK="F0"
                echo "📱 Device: $DEVICE (SDM636 - 4+4 cores)"
                ;;
              tulip)
                # Snapdragon 660 (same as lavender)
                BIG_MASK="0F"
                LITTLE_MASK="F0"
                echo "📱 Device: $DEVICE (SDM660 - 4+4 cores)"
                ;;
              jasmine*)
                # Snapdragon 660
                BIG_MASK="0F"
                LITTLE_MASK="F0"
                echo "📱 Device: $DEVICE (SDM660 - 4+4 cores)"
                ;;
              wayne)
                # Snapdragon 660
                BIG_MASK="0F"
                LITTLE_MASK="F0"
                echo "📱 Device: $DEVICE (SDM660 - 4+4 cores)"
                ;;
              *)
                # Default: auto-detect from /proc/cpuinfo or use safe defaults
                echo "⚠️ Unknown device: $DEVICE, using default CPU mask"
                BIG_MASK="0F"
                LITTLE_MASK="F0"
                ;;
            esac

            # Apply CPU mask to defconfig
            if grep -q "CONFIG_BIG_CPU_MASK" "$DEFCONFIG_PATH"; then
              sed -i "s/CONFIG_BIG_CPU_MASK=.*/CONFIG_BIG_CPU_MASK=${BIG_MASK}/g" "$DEFCONFIG_PATH"
              echo "✅ Set CONFIG_BIG_CPU_MASK=${BIG_MASK}"
            fi

            if grep -q "CONFIG_LITTLE_CPU_MASK" "$DEFCONFIG_PATH"; then
              sed -i "s/CONFIG_LITTLE_CPU_MASK=.*/CONFIG_LITTLE_CPU_MASK=${LITTLE_MASK}/g" "$DEFCONFIG_PATH"
              echo "✅ Set CONFIG_LITTLE_CPU_MASK=${LITTLE_MASK}"
            fi

            if grep -q "CONFIG_CPU_MASK" "$DEFCONFIG_PATH" && ! grep -q "CONFIG_BIG_CPU_MASK\|CONFIG_LITTLE_CPU_MASK" "$DEFCONFIG_PATH"; then
              sed -i "s/CONFIG_CPU_MASK=.*/CONFIG_CPU_MASK=${BIG_MASK}/g" "$DEFCONFIG_PATH"
              echo "✅ Set CONFIG_CPU_MASK=${BIG_MASK}"
            fi

            echo "🎯 CPU cluster mask configured!"
          else
            echo "ℹ️ No CPU mask config found in defconfig, skipping..."
          fi

      - name: 🛡️ Patch KernelSU Next
        if: github.event.inputs.ksu_next == 'yes'
        run: |
          echo "🛡️ Patching KernelSU Next..."
          cd kernel

          # Clone KernelSU Next with fallback
          git clone --depth=1 https://github.com/rifsxd/KernelSU-Next.git KernelSU-Next 2>/dev/null ||           git clone --depth=1 https://github.com/KernelSU-Next/KernelSU-Next.git KernelSU-Next 2>/dev/null ||           git clone --depth=1 https://github.com/tiann/KernelSU.git KernelSU-Next 2>/dev/null || true

          if [ -d "KernelSU-Next" ]; then
            cd KernelSU-Next
            KSU_GIT_VER=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
            cd ..

            # Apply KernelSU patch
            if [ -f "KernelSU-Next/kernel/setup.sh" ]; then
              bash KernelSU-Next/kernel/setup.sh
            elif [ -f "KernelSU-Next/setup.sh" ]; then
              bash KernelSU-Next/setup.sh
            else
              ln -sf $(pwd)/KernelSU-Next/kernel $(pwd)/drivers/kernelsu 2>/dev/null || true
              if [ -f "drivers/Kconfig" ]; then
                if ! grep -q "kernelsu" drivers/Kconfig; then
                  echo "source drivers/kernelsu/Kconfig" >> drivers/Kconfig
                fi
              fi
            fi

            # Enable KernelSU in defconfig (cari path yang benar)
            KSU_ADDED=false
            for path in               "arch/arm64/configs/${{ github.event.inputs.defconfig }}"               "arch/arm/configs/${{ github.event.inputs.defconfig }}"               "arch/arm64/configs/vendor/${{ github.event.inputs.defconfig }}"               "arch/arm/configs/vendor/${{ github.event.inputs.defconfig }}"; do
              if [ -f "$path" ]; then
                echo "CONFIG_KSU=y" >> "$path"
                echo "✅ KernelSU enabled in: $path"
                KSU_ADDED=true
                break
              fi
            done

            if [ "$KSU_ADDED" != "true" ]; then
              echo "⚠️ Could not find defconfig to patch KernelSU"
            fi

            echo "✅ KernelSU Next patched! (Git: ${KSU_GIT_VER})"
          else
            echo "⚠️ Failed to clone KernelSU Next, continuing without patch..."
          fi

      - name: 🔧 Setup Clang Toolchain
        run: |
          echo "🔧 Setting up Clang toolchain..."
          mkdir -p toolchain
          cd toolchain

          # Try Proton Clang first (recommended, includes GCC)
          echo "📥 Trying Proton Clang..."
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git 2>&1 | tail -n 3

          if [ -d "proton-clang/bin" ]; then
            echo "CLANG_PATH=$(realpath proton-clang)" >> $GITHUB_ENV
            echo "✅ Proton Clang found!"
            echo "🔧 Clang version: $(proton-clang/bin/clang --version | head -n 1)"
          else
            # Fallback: AOSP Clang
            echo "📥 Falling back to AOSP Clang..."
            git clone --depth=1 -b master               https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 clang 2>&1 | tail -n 3

            CLANG_DIR=$(find clang -maxdepth 2 -name "bin" -type d | head -n 1 | xargs dirname 2>/dev/null)
            if [ -n "$CLANG_DIR" ] && [ -d "$CLANG_DIR/bin" ]; then
              echo "CLANG_PATH=$(realpath $CLANG_DIR)" >> $GITHUB_ENV
              echo "✅ AOSP Clang found at: $(realpath $CLANG_DIR)"
            else
              echo "❌ No Clang toolchain found!"
              exit 1
            fi
          fi

          # Setup GCC fallback (for kernels that need it)
          cd ${{ github.workspace }}
          if [ ! -d "toolchain/gcc-aarch64" ]; then
            echo "📥 Setting up GCC fallback..."
            cd toolchain
            # Try to get GCC from Android prebuilts
            git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9.git gcc-aarch64 2>&1 | tail -n 3 || true
            git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9.git gcc-arm 2>&1 | tail -n 3 || true
            cd ..
          fi
          echo "✅ Toolchain setup complete!"

      - name: 🔧 Setup Build Environment
        run: |
          echo "🔧 Setting up build environment..."
          cd kernel

          export KBUILD_BUILD_USER="${{ github.event.inputs.kbuild_user }}"
          export KBUILD_BUILD_HOST="GitHub-Actions"
          export KBUILD_BUILD_TIMESTAMP="${{ env.FULL_DATE }}"

          # Detect architecture
          if [ -d "arch/arm64" ]; then
            export ARCH=arm64
            export SUBARCH=arm64
            echo "🎯 Architecture: arm64"
          else
            export ARCH=arm
            export SUBARCH=arm
            echo "🎯 Architecture: arm"
          fi

          # Set PATH with Clang first
          export PATH="${{ env.CLANG_PATH }}/bin:$PATH"

          # Determine CROSS_COMPILE based on available tools
          if [ -f "${{ github.workspace }}/toolchain/gcc-aarch64/bin/aarch64-linux-android-"*gcc ]; then
            export CROSS_COMPILE="${{ github.workspace }}/toolchain/gcc-aarch64/bin/aarch64-linux-android-"
            export CROSS_COMPILE_ARM32="${{ github.workspace }}/toolchain/gcc-arm/bin/arm-linux-androideabi-"
            echo "🔧 Using GCC cross compiler"
          else
            # Use Clang's built-in cross compilation
            if [ "$ARCH" = "arm64" ]; then
              export CROSS_COMPILE="aarch64-linux-gnu-"
              export CROSS_COMPILE_ARM32="arm-linux-gnueabihf-"
            else
              export CROSS_COMPILE="arm-linux-gnueabihf-"
            fi
            echo "🔧 Using Clang built-in cross compilation"
          fi

          export CLANG_TRIPLE="aarch64-linux-gnu-"

          # Save to GITHUB_ENV
          echo "ARCH=${ARCH}" >> $GITHUB_ENV
          echo "SUBARCH=${SUBARCH}" >> $GITHUB_ENV
          echo "CROSS_COMPILE=${CROSS_COMPILE}" >> $GITHUB_ENV
          echo "CROSS_COMPILE_ARM32=${CROSS_COMPILE_ARM32}" >> $GITHUB_ENV
          echo "CLANG_TRIPLE=${CLANG_TRIPLE}" >> $GITHUB_ENV
          echo "KBUILD_BUILD_USER=${KBUILD_BUILD_USER}" >> $GITHUB_ENV
          echo "KBUILD_BUILD_HOST=${KBUILD_BUILD_HOST}" >> $GITHUB_ENV

          echo "✅ Build environment configured!"

      - name: 🧹 Clean Build
        run: |
          echo "🧹 Cleaning previous build artifacts..."
          cd kernel
          # Full clean
          make clean 2>/dev/null || true
          make mrproper 2>/dev/null || true
          rm -rf out
          rm -f .config .config.old
          # Clean KernelSU if exists
          rm -rf drivers/kernelsu 2>/dev/null || true
          rm -rf KernelSU-Next 2>/dev/null || true
          # Remove any stale object files
          find . -name "*.o" -delete 2>/dev/null || true
          find . -name "*.o.cmd" -delete 2>/dev/null || true
          echo "✅ Clean complete!"

      - name: ⚙️ Generate Defconfig
        run: |
          echo "⚙️ Generating defconfig..."
          cd kernel

          export PATH="${{ env.CLANG_PATH }}/bin:$PATH"
          export ARCH=${{ env.ARCH }}
          export SUBARCH=${{ env.SUBARCH }}
          export CROSS_COMPILE=${{ env.CROSS_COMPILE }}
          export CROSS_COMPILE_ARM32=${{ env.CROSS_COMPILE_ARM32 }}
          export CLANG_TRIPLE=${{ env.CLANG_TRIPLE }}
          export KBUILD_BUILD_USER=${{ env.KBUILD_BUILD_USER }}
          export KBUILD_BUILD_HOST=${{ env.KBUILD_BUILD_HOST }}

          # Disable stack protector before build for older kernels
          # Cari defconfig di berbagai path
          DEFCONFIG_FOUND=false
          for path in             "arch/${{ env.ARCH }}/configs/${{ github.event.inputs.defconfig }}"             "arch/arm64/configs/${{ github.event.inputs.defconfig }}"             "arch/arm/configs/${{ github.event.inputs.defconfig }}"             "arch/${{ env.ARCH }}/configs/vendor/${{ github.event.inputs.defconfig }}"             "arch/arm64/configs/vendor/${{ github.event.inputs.defconfig }}"             "arch/arm/configs/vendor/${{ github.event.inputs.defconfig }}"; do
            if [ -f "$path" ]; then
              DEFCONFIG_PATH="$path"
              DEFCONFIG_FOUND=true
              echo "✅ Defconfig found at: $path"
              break
            fi
          done

          if [ "$DEFCONFIG_FOUND" != "true" ]; then
            echo "❌ Defconfig not found!"
            echo "🔍 Searching for similar files..."
            find arch -name "*${{ github.event.inputs.defconfig }}*" 2>/dev/null || true
            find arch -name "*defconfig" -type f 2>/dev/null | head -n 20 || true
            exit 1
          fi

          # Disable stack protector for compatibility
          sed -i 's/CONFIG_CC_STACKPROTECTOR=y/# CONFIG_CC_STACKPROTECTOR is not set/g' "$DEFCONFIG_PATH" 2>/dev/null || true
          sed -i 's/CONFIG_CC_STACKPROTECTOR_STRONG=y/# CONFIG_CC_STACKPROTECTOR_STRONG is not set/g' "$DEFCONFIG_PATH" 2>/dev/null || true
          sed -i 's/CONFIG_CC_STACKPROTECTOR_AUTO=y/# CONFIG_CC_STACKPROTECTOR_AUTO is not set/g' "$DEFCONFIG_PATH" 2>/dev/null || true
          sed -i 's/CONFIG_CC_STACKPROTECTOR_REGULAR=y/# CONFIG_CC_STACKPROTECTOR_REGULAR is not set/g' "$DEFCONFIG_PATH" 2>/dev/null || true

          echo "# CONFIG_CC_STACKPROTECTOR is not set" >> "$DEFCONFIG_PATH"
          echo "# CONFIG_CC_STACKPROTECTOR_STRONG is not set" >> "$DEFCONFIG_PATH"
          echo "# CONFIG_CC_STACKPROTECTOR_AUTO is not set" >> "$DEFCONFIG_PATH"
          echo "# CONFIG_CC_STACKPROTECTOR_REGULAR is not set" >> "$DEFCONFIG_PATH"

          make O=out ${{ github.event.inputs.defconfig }} 2>&1 | tail -n 10
          echo "✅ Defconfig generated!"

      - name: 🔨 Build Kernel
        run: |
          echo "🔨 Starting kernel build..."
          echo "⏳ This may take a while, please be patient..."
          cd kernel

          export PATH="${{ env.CLANG_PATH }}/bin:$PATH"
          export ARCH=${{ env.ARCH }}
          export SUBARCH=${{ env.SUBARCH }}
          export CROSS_COMPILE=${{ env.CROSS_COMPILE }}
          export CROSS_COMPILE_ARM32=${{ env.CROSS_COMPILE_ARM32 }}
          export CLANG_TRIPLE=${{ env.CLANG_TRIPLE }}
          export KBUILD_BUILD_USER=${{ env.KBUILD_BUILD_USER }}
          export KBUILD_BUILD_HOST=${{ env.KBUILD_BUILD_HOST }}

          # Determine build flags based on kernel version
          BUILD_FLAGS="CC=clang"

          # Check if we have llvm tools
          if command -v llvm-ar &> /dev/null || [ -f "${{ env.CLANG_PATH }}/bin/llvm-ar" ]; then
            BUILD_FLAGS="$BUILD_FLAGS AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip"
          fi

          # For older kernels (4.9, 4.14, 4.19), use GCC ld as fallback
          if [ -f "${{ github.workspace }}/toolchain/gcc-aarch64/bin/aarch64-linux-android-ld" ]; then
            BUILD_FLAGS="$BUILD_FLAGS LD=${{ github.workspace }}/toolchain/gcc-aarch64/bin/aarch64-linux-android-ld"
          elif [ -f "${{ env.CLANG_PATH }}/bin/ld.lld" ]; then
            BUILD_FLAGS="$BUILD_FLAGS LD=ld.lld"
          fi

          # Use LLVM integrated assembler
          BUILD_FLAGS="$BUILD_FLAGS AS=llvm-as"

          echo "🔧 Build flags: $BUILD_FLAGS"

          # Build
          make -j$(nproc --all) O=out $BUILD_FLAGS             CROSS_COMPILE=${{ env.CROSS_COMPILE }}             CROSS_COMPILE_ARM32=${{ env.CROSS_COMPILE_ARM32 }}             CLANG_TRIPLE=${{ env.CLANG_TRIPLE }}             2>&1 | tee build.log | tail -n 50

          BUILD_STATUS=${PIPESTATUS[0]}

          if [ $BUILD_STATUS -ne 0 ]; then
            echo "❌ Build failed! Checking for errors..."
            tail -n 100 build.log
            exit 1
          fi

          echo "✅ Kernel build completed successfully!"

      - name: 🔍 Find Kernel Image
        id: kernel_image
        run: |
          echo "🔍 Searching for compiled kernel image..."
          cd kernel

          KERNEL_IMG=""
          for img in "out/arch/arm64/boot/Image.gz-dtb"                      "out/arch/arm64/boot/Image.gz"                      "out/arch/arm64/boot/Image"                      "out/arch/arm/boot/zImage-dtb"                      "out/arch/arm/boot/zImage"                      "arch/arm64/boot/Image.gz-dtb"                      "arch/arm64/boot/Image.gz"                      "arch/arm64/boot/Image"                      "arch/arm/boot/zImage-dtb"                      "arch/arm/boot/zImage"; do
            if [ -f "$img" ]; then
              KERNEL_IMG="$img"
              echo "✅ Kernel image found: $img"
              break
            fi
          done

          if [ -z "$KERNEL_IMG" ]; then
            echo "❌ Kernel image not found!"
            find out/arch -type f 2>/dev/null | head -n 20 || true
            exit 1
          fi

          echo "KERNEL_IMAGE=${KERNEL_IMG}" >> $GITHUB_ENV
          echo "KERNEL_SIZE=$(du -h ${KERNEL_IMG} | cut -f1)" >> $GITHUB_ENV
          echo "📊 Kernel size: $(du -h ${KERNEL_IMG} | cut -f1)"

      - name: 📦 Prepare Output Filename
        id: filename
        run: |
          echo "📦 Preparing output filename..."

          if [ "${{ github.event.inputs.ksu_next }}" == "yes" ]; then
            VARIANT="ksu"
            OUTPUT_NAME="${{ github.event.inputs.kernel_name }}_${{ github.event.inputs.device_codename }}-${VARIANT}-${{ env.DATE }}.zip"
          else
            OUTPUT_NAME="${{ github.event.inputs.kernel_name }}_${{ github.event.inputs.device_codename }}-${{ env.DATE }}.zip"
          fi

          echo "OUTPUT_NAME=${OUTPUT_NAME}" >> $GITHUB_ENV
          echo "📝 Output filename: ${OUTPUT_NAME}"

      - name: 📦 Package with AnyKernel3
        if: github.event.inputs.use_anykernel == 'yes'
        run: |
          echo "📦 Packaging with AnyKernel3..."

          git clone --depth=1 -b ${{ github.event.inputs.anykernel_branch }}             ${{ github.event.inputs.anykernel_source }} anykernel 2>&1 | tail -n 3

          cd anykernel
          rm -f zImage Image* *.dtb dtbo.img *.zip 2>/dev/null || true

          cp ../kernel/${{ env.KERNEL_IMAGE }} . 2>/dev/null ||           cp ${{ env.KERNEL_IMAGE }} . 2>/dev/null || true

          if [ -f "../kernel/out/arch/${{ env.ARCH }}/boot/dtb" ]; then
            cp ../kernel/out/arch/${{ env.ARCH }}/boot/dtb . 2>/dev/null || true
          fi

          if [ -f "../kernel/out/arch/${{ env.ARCH }}/boot/dtbo.img" ]; then
            cp ../kernel/out/arch/${{ env.ARCH }}/boot/dtbo.img . 2>/dev/null || true
          fi

          if [ -f "anykernel.sh" ]; then
            sed -i "s/kernel.string=.*/kernel.string=${{ github.event.inputs.kernel_name }}/g" anykernel.sh 2>/dev/null || true
            sed -i "s/device.name1=.*/device.name1=${{ github.event.inputs.device_codename }}/g" anykernel.sh 2>/dev/null || true
          fi

          zip -r9 ../${{ env.OUTPUT_NAME }} * -x ".git/*" "*.md" "LICENSE" "*.zip" 2>&1 | tail -n 5
          cd ..

          echo "✅ AnyKernel3 package created!"
          echo "📊 Package size: $(du -h ${{ env.OUTPUT_NAME }} | cut -f1)"

      - name: 📦 Package Raw Kernel
        if: github.event.inputs.use_anykernel == 'no'
        run: |
          echo "📦 Packaging raw kernel..."

          mkdir -p raw_kernel
          cp kernel/${{ env.KERNEL_IMAGE }} raw_kernel/ 2>/dev/null ||           cp ${{ env.KERNEL_IMAGE }} raw_kernel/ 2>/dev/null || true

          if [ -f "kernel/out/arch/${{ env.ARCH }}/boot/dtb" ]; then
            cp kernel/out/arch/${{ env.ARCH }}/boot/dtb raw_kernel/ 2>/dev/null || true
          fi

          if [ -f "kernel/out/arch/${{ env.ARCH }}/boot/dtbo.img" ]; then
            cp kernel/out/arch/${{ env.ARCH }}/boot/dtbo.img raw_kernel/ 2>/dev/null || true
          fi

          cat > raw_kernel/README.txt << EOF
          Kernel: ${{ github.event.inputs.kernel_name }}
          Device: ${{ github.event.inputs.device_codename }}
          Date: ${{ env.FULL_DATE }}
          KernelSU Next: ${{ github.event.inputs.ksu_next }}
          Build User: ${{ github.event.inputs.kbuild_user }}
          EOF

          cd raw_kernel
          zip -r9 ../${{ env.OUTPUT_NAME }} * -x "*.zip" 2>&1 | tail -n 5
          cd ..

          echo "✅ Raw kernel package created!"
          echo "📊 Package size: $(du -h ${{ env.OUTPUT_NAME }} | cut -f1)"

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OUTPUT_NAME }}
          path: ${{ env.OUTPUT_NAME }}
          retention-days: 7

      - name: 🎉 Build Summary
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║                   🎉 BUILD SUCCESSFUL! 🎉                  ║"
          echo "╠════════════════════════════════════════════════════════════╣"
          echo "║  🏷️  Kernel Name: ${{ github.event.inputs.kernel_name }}"
          echo "║  📱 Device: ${{ github.event.inputs.device_codename }}"
          echo "║  🛡️  KernelSU Next: ${{ github.event.inputs.ksu_next }}"
          echo "║  📦 Package: ${{ env.OUTPUT_NAME }}"
          echo "║  📊 Kernel Size: ${{ env.KERNEL_SIZE }}"
          echo "║  📅 Build Date: ${{ env.FULL_DATE }}"
          echo "║  👤 Built by: ${{ github.event.inputs.kbuild_user }}"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          echo "📥 Download your kernel from the Artifacts section!"
